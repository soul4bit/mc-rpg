spring:
  datasource:
    url: jdbc:h2:mem:obsidiangate-auth;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

auth:
  jwt-secret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  access-token-ttl-seconds: 900
  refresh-token-ttl-days: 30
  game-ticket-ttl-seconds: 45
  server-id: obsidiangate-main
